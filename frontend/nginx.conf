server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA client-side routing — any unknown path falls back to index.html so
    # React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container on the docker network.
    # 'backend' is the service name in docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Sync calls can take minutes for a full lookback. Bump the read
        # timeout so the proxy doesn't kill long-running initial syncs.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
