code: he

# ── Shipping shape detection ───────────────────────────────────────────────────
shipping_signals:
  - 'משלוח'
  - 'חבילה'
  - 'מעקב'
  - 'נשלח'
  - 'מוכן לאיסוף'
  - 'יצא לחלוקה'
  - 'נמסר'

# ── Footer / boilerplate stripping ────────────────────────────────────────────
# Israeli mailing-system footer boilerplate.
footer_patterns:
  - 'הודעה זו נשלחה ל-.{0,300}'
  - 'נשלח באמצעות.{0,300}'
  - 'מערכת דיוור.{0,300}'

unsubscribe_patterns:
  - 'הסר\s*מרשימה.{0,200}'
  - 'בטל\s*מנוי.{0,200}'

# ── Invoice / billing detection ───────────────────────────────────────────────
billing_exclusion_phrases:
  - 'חשבונית\s+מס'
  - 'פירוט חיובים'
  - 'חיובים תקופתיים'

shipping_override_phrases:
  - 'מספר\s+מעקב'
  - 'נשלח'
  - 'משלוח'
  - 'חבילה'
  - 'יצא\s+לדרך'

# ── Identifier extraction ─────────────────────────────────────────────────────
tracking_context_words:
  - 'מספר\s+מעקב'
  - 'משלוח'
  - 'חבילה'

order_label_patterns:
  hebrew: "(?:מספר\\s*הזמנה|מס[׳']\\s*הזמנה)[^#\\d]{0,20}#?(\\d{4,30})\\b"

# ── Gmail query terms ─────────────────────────────────────────────────────────
query_include_terms:
  strong_shipping:
    - '"מספר מעקב"'
    - '"ההזמנה נשלחה"'
    - '"ההזמנה שלך נשלחה"'
    - '"המשלוח נשלח"'
    - '"מוכן לאיסוף"'
    - '"יצא לדרך"'
  package_words:
    - 'חבילה'
    - 'משלוח'
  order_lifecycle:
    - '"אישור ההזמנה"'
    - '"הזמנתך התקבלה"'
  weak_phrases: []

query_exclude_terms:
  - 'פרסומת'
  - '"סיכום חודש"'
  - '"חשבונית מס"'
  - '"חשבונית מס קבלה"'
  - '"פירוט חיובים"'
  - '"חיובים תקופתיים"'

allowlist_broad_terms:
  - 'משלוח'
  - 'הזמנה'

# ── Status phrase patterns ────────────────────────────────────────────────────
status_patterns:
  delivered:
    - 'תודה שאספת את המשלוח'
    - 'נאסף בהצלחה'
    - 'נמסר'
    - 'הגיע ליעדו'
    - 'נמסר בהצלחה'

  action_required:
    - 'אסוף לפני'
    - 'יום אחרון לאיסוף'
    - 'הזמנה תוחזר'
    - 'אנא אסוף את הזמנתך'

  ready_for_pickup:
    - 'מוכן לאיסוף'
    - 'ממתין לאיסוף'
    - 'ניתן לאסוף'
    - 'זמין לאיסוף'

  payment_required:
    - 'אגרת מכס'
    - 'תשלום מכס'
    - 'נדרש תשלום'
    - 'שלם מכס'

  out_for_delivery:
    - 'יצא לחלוקה'
    - 'בדרך אליך'
    - 'שליח בדרך'

  customs_released:
    - 'שוחרר מהמכס'
    - 'עבר את המכס'
    - 'מכס שוחרר'

  customs_pending:
    - 'עצור במכס'
    - 'ממתין למכס'
    - 'בהמתנה למכס'
    - 'בביקורת מכס'

  handed_to_local_carrier:
    - 'הועבר לחברה מקומית'
    - 'הועבר לשליח'
    - 'מסור לחברת משלוחים'

  arrived_in_destination_country:
    - 'הגיע לישראל'
    - 'נכנס למדינה'
    - 'הגיע ליעד'

  delayed_or_problem:
    - 'לא ניתן למסור'
    - 'כתובת שגויה'
    - 'בעיית מסירה'
    - 'עיכוב\s+(?:במשלוח|במסירה|בחבילה)'
    - '(?:משלוח|חבילה|מסירה)\s+(?:\S+\s+){0,3}עיכוב'

  in_transit:
    - 'בדרך'
    - 'בתעבורה'
    - 'בנסיעה'
    - 'בטיסה'
    - 'בספינה'

  received_by_carrier:
    - 'נאסף ע.*?י'
    - 'התקבל אצל השליח'
    - 'התקבל לטיפול'

  shipped:
    - 'נשלח'
    - 'יצא לדרך'
    - 'שוגר'

  order_confirmed:
    - 'הזמנה אושרה'
    - 'הזמנתך התקבלה'
    - 'תודה על הזמנתך'
