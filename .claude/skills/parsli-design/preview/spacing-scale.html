<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .row { display: grid; grid-template-columns: 70px 1fr 80px; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid #ddd8cf; }
  .row:last-child { border-bottom: none; }
  .name { font-family: var(--font-mono); font-size: 11px; color: #3d4a3a; font-weight: 700; }
  .bar  { height: 14px; background: #8aab8c; border-radius: 3px; }
  .px   { font-family: var(--font-mono); font-size: 11px; color: #7a8a7e; text-align: right; }
</style>
<div style="background:#f5f0e8;border-radius:12px;padding:14px 18px;border:1px solid #ddd8cf;">
  <div class="row"><div class="name">sp-1</div><div class="bar" style="width: 4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="name">sp-2</div><div class="bar" style="width: 8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="name">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="name">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="name">sp-5</div><div class="bar" style="width:20px"></div><div class="px">20px</div></div>
  <div class="row"><div class="name">sp-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="name">sp-7</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="name">sp-8</div><div class="bar" style="width:40px"></div><div class="px">40px</div></div>
  <div class="row"><div class="name">sp-9</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</div>

</div></body></html>
