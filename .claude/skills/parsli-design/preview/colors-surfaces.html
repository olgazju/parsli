<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surface stack</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .stack { background: #e5dfd4; border-radius: 12px; padding: 18px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #c8bfb2; }
  .layer { padding: 12px 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
  .lab { font-weight: 700; color: #3d4a3a; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: #7a8a7e; }
  .l1 { background: #e5dfd4; border: 1px solid #c8bfb2; }
  .l2 { background: #f5f0e8; border: 1px solid #ddd8cf; }
  .l3 { background: #faf7f2; border: 1px solid #ddd8cf; }
  .l4 { background: #3d4a3a; }
  .l4 .lab, .l4 .hex { color: #f5f0e8; }
  .note { font-size: 10.5px; color: #7a8a7e; line-height: 1.5; margin-top: 4px; }
</style>
<div class="stack">
  <div class="layer l1"><span class="lab">Page background</span><span class="hex">#e5dfd4</span></div>
  <div class="layer l2"><span class="lab">Surface (cards)</span><span class="hex">#f5f0e8</span></div>
  <div class="layer l3"><span class="lab">Surface high (hover/active)</span><span class="hex">#faf7f2</span></div>
  <div class="layer l4"><span class="lab">Shell dark (sidebar)</span><span class="hex">#3d4a3a</span></div>
  <div class="note">Cards lift off the page from color alone — no shadow on rest. Hover may add 0 2px 12px rgba(61,74,58,.08).</div>
</div>

</div></body></html>
