<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography — emoji set</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tile { background: #f5f0e8; border-radius: 12px; padding: 12px 8px; border: 1px solid #ddd8cf; text-align: center; }
  .ic { font-size: 26px; line-height: 1; margin-bottom: 6px; }
  .nm { font-size: 10px; font-weight: 700; color: #3d4a3a; text-transform: uppercase; letter-spacing: .5px; }
  .use { font-size: 9px; color: #7a8a7e; margin-top: 2px; }
</style>
<div class="grid">
  <div class="tile"><div class="ic">📦</div><div class="nm">Parcels</div><div class="use">nav · empty</div></div>
  <div class="tile"><div class="ic">📡</div><div class="nm">Comms</div><div class="use">accounts</div></div>
  <div class="tile"><div class="ic">⚙️</div><div class="nm">Prefs</div><div class="use">settings</div></div>
  <div class="tile"><div class="ic">🔬</div><div class="nm">Diagnostics</div><div class="use">dev only</div></div>
  <div class="tile"><div class="ic">🔒</div><div class="nm">Privacy</div><div class="use">banner</div></div>
  <div class="tile"><div class="ic">📭</div><div class="nm">Empty</div><div class="use">no cargo</div></div>
</div>

</div></body></html>
