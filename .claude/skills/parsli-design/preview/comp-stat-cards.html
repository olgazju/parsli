<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stat cards (4-up)</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat { background: #f5f0e8; border-radius: 12px; padding: 14px 16px 12px; border: 1px solid #ddd8cf; border-bottom: 3px solid #d5cec2; }
  .stat.blue { border-bottom-color: #87ceeb; }
  .stat.green { border-bottom-color: #6b8f6e; }
  .stat.yellow { border-bottom-color: #e8b44c; }
  .stat.red { border-bottom-color: #b54b3a; }
  .stat .lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #7a8a7e; margin-bottom: 6px; }
  .stat .num { font-size: 28px; font-weight: 800; color: #3d4a3a; line-height: 1; }
</style>
<div class="grid">
  <div class="stat blue"><div class="lbl">Active</div><div class="num">7</div></div>
  <div class="stat green"><div class="lbl">Delivered</div><div class="num">23</div></div>
  <div class="stat yellow"><div class="lbl">Arriving today</div><div class="num">2</div></div>
  <div class="stat red"><div class="lbl">Needs review</div><div class="num">1</div></div>
</div>

</div></body></html>
