<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Source toggles</title>
<link rel="stylesheet" href="card.css">
</head>
<body><div class="preview-root">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sensor { background: #faf7f2; border: 1.5px solid #8aab8c; border-radius: 10px; padding: 14px 8px; text-align: center; }
  .sensor.off { background: #e5dfd4; border-color: #ddd8cf; opacity: .55; }
  .ic { font-size: 24px; margin-bottom: 4px; }
  .name { font-size: 9.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #7a8a7e; margin-bottom: 2px; }
  .lab { font-size: 10.5px; color: #3d4a3a; font-weight: 600; }
  .state { font-size: 9.5px; margin-top: 6px; font-weight: 700; letter-spacing: .5px; }
  .state.on { color: #6b8f6e; }
  .state.off { color: #7a8a7e; }
  .note { font-size: 10px; color: #7a8a7e; margin-top: 8px; line-height: 1.5; }
</style>
<div class="grid">
  <div class="sensor"><div class="ic">📧</div><div class="name">Email</div><div class="lab">Gmail</div><div class="state on">● CONNECTED</div></div>
  <div class="sensor off"><div class="ic">💬</div><div class="name">SMS</div><div class="lab">Text messages</div><div class="state off">○ DORMANT</div></div>
  <div class="sensor off"><div class="ic">🎙️</div><div class="name">Voice</div><div class="lab">Call notes</div><div class="state off">○ DORMANT</div></div>
  <div class="sensor off"><div class="ic">📸</div><div class="name">Screenshots</div><div class="lab">Order pages</div><div class="state off">○ DORMANT</div></div>
</div>
<div class="note">Plain labels by default. Retro Station theme swaps in <em>Comms array · Short-range · Audio decoder · Visual scanner</em>.</div>
</div></body></html>
