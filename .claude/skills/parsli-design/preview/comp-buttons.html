<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .btn { font-family: var(--font-sans); display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-size: 13.5px; font-weight: 600; border: none; cursor: pointer; }
  .btn-sm { padding: 7px 13px; font-size: 12.5px; border-radius: 8px; }
  .btn-primary { background: #3d4a3a; color: #f5f0e8; }
  .btn-secondary { background: #f5f0e8; color: #3d4a3a; border: 1.5px solid #c8bfb2; }
  .btn-danger { background: #f5dcd7; color: #7a2e22; border: 1.5px solid rgba(181,75,58,.2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .lbl { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #7a8a7e; margin-bottom: 6px; }
</style>
<div style="background:#f5f0e8;border-radius:12px;padding:14px 18px;border:1px solid #ddd8cf;">
  <div class="lbl">Primary · Secondary · Danger</div>
  <div class="row">
    <button class="btn btn-primary">Calibrate Comms Array</button>
    <button class="btn btn-secondary">↻ Sync</button>
    <button class="btn btn-danger">Remove</button>
    <button class="btn btn-primary" disabled>Disabled</button>
  </div>
  <div class="lbl" style="margin-top:6px">Small variants</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Connect</button>
    <button class="btn btn-secondary btn-sm">Edit</button>
    <button class="btn btn-danger btn-sm">Delete</button>
  </div>
</div>

</div></body></html>
