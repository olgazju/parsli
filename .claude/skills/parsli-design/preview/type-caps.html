<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter-spacing & caps</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .grp { background: #f5f0e8; border-radius: 12px; padding: 14px 18px; border: 1px solid #ddd8cf; margin-bottom: 8px; }
  .lbl { font-size: 9px; color: #7a8a7e; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .ex  { color: #3d4a3a; }
</style>
<div class="grp">
  <div class="lbl">Logo tracking · 1.5px</div>
  <div class="ex" style="font-size:30px;font-weight:800;letter-spacing:1.5px">pars<em style="font-style:normal;color:#8aab8c">li</em></div>
</div>
<div class="grp">
  <div class="lbl">Tagline tracking · 2.5px, uppercase</div>
  <div class="ex" style="font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#7a8a7e">LOCAL PARCEL INTELLIGENCE</div>
</div>
<div class="grp">
  <div class="lbl">Section label · 1.5px, uppercase</div>
  <div class="ex" style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7a8a7e">CONNECTED ACCOUNTS</div>
</div>
<div class="grp">
  <div class="lbl">Mono / manifest readout</div>
  <div class="ex" style="font-family:var(--font-mono);font-size:12px;color:#7a8a7e">batch a7c41f3e · 184 results · 312ms</div>
</div>

</div></body></html>
