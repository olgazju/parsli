<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Core palette</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw   { border-radius: 10px; min-height: 86px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid rgba(0,0,0,.06); }
  .sw .n { font-size: 11px; font-weight: 700; letter-spacing: .2px; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; opacity: .8; margin-top: 1px; }
  .dark .n, .dark .h { color: #f5f0e8; }
  .light .n, .light .h { color: #3d4a3a; }
</style>
<div class="grid">
  <div class="sw dark"  style="background:#3d4a3a"><div class="n">Dark olive</div><div class="h">#3d4a3a</div></div>
  <div class="sw light" style="background:#6b8f6e; color:#f5f0e8"><div class="n" style="color:#fff">Olive</div><div class="h" style="color:#e6efe7">#6b8f6e</div></div>
  <div class="sw light" style="background:#8aab8c"><div class="n" style="color:#2a3528">Sage</div><div class="h" style="color:#2a3528">#8aab8c</div></div>
  <div class="sw light" style="background:#87ceeb"><div class="n" style="color:#1d3e51">Sky blue</div><div class="h" style="color:#1d3e51">#87ceeb</div></div>
  <div class="sw light" style="background:#c4956a"><div class="n" style="color:#3b240e">Warm tan</div><div class="h" style="color:#3b240e">#c4956a</div></div>
  <div class="sw light" style="background:#b54b3a"><div class="n" style="color:#fdeae6">Jacket red</div><div class="h" style="color:#fdeae6">#b54b3a</div></div>
  <div class="sw light" style="background:#e8b44c"><div class="n" style="color:#4a3614">Warm yellow</div><div class="h" style="color:#4a3614">#e8b44c</div></div>
  <div class="sw light" style="background:#f2a7b3"><div class="n" style="color:#5e2330">Dusty pink</div><div class="h" style="color:#5e2330">#f2a7b3</div></div>
  <div class="sw light" style="background:#7a8a7e"><div class="n" style="color:#f0eee5">Metal gray</div><div class="h" style="color:#f0eee5">#7a8a7e</div></div>
  <div class="sw light" style="background:#f5f0e8"><div class="n">Warm cream</div><div class="h">#f5f0e8</div></div>
  <div class="sw light" style="background:#d5cec2"><div class="n">Muted beige</div><div class="h">#d5cec2</div></div>
  <div class="sw light" style="background:#e5dfd4"><div class="n">Page bg</div><div class="h">#e5dfd4</div></div>
</div>

</div></body></html>
