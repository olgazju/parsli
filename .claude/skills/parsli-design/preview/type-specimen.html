<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nunito specimen</title>
<link rel="stylesheet" href="card.css">

</head>
<body><div class="preview-root">

<style>
  .spec { background: #f5f0e8; border-radius: 12px; padding: 18px 20px; border: 1px solid #ddd8cf; }
  .big  { font-size: 56px; font-weight: 800; color: #3d4a3a; letter-spacing: -1px; line-height: 1; }
  .mid  { font-size: 22px; font-weight: 700; color: #3d4a3a; margin-top: 8px; }
  .small{ font-size: 12px; font-weight: 400; color: #7a8a7e; margin-top: 4px; }
  .row  { display: flex; gap: 16px; margin-top: 10px; }
  .w    { font-size: 16px; color: #3d4a3a; }
  .lbl  { font-size: 9.5px; color: #7a8a7e; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
</style>
<div class="spec">
  <div class="big">Parsli</div>
  <div class="mid">Nunito · Rounded, friendly, slightly bubbly</div>
  <div class="small">The brand voice in type form. Compact UI sizes; expressive at hero scale.</div>
  <div class="row">
    <div><div class="lbl">400</div><div class="w" style="font-weight:400">Regular</div></div>
    <div><div class="lbl">500</div><div class="w" style="font-weight:500">Medium</div></div>
    <div><div class="lbl">600</div><div class="w" style="font-weight:600">Semibold</div></div>
    <div><div class="lbl">700</div><div class="w" style="font-weight:700">Bold</div></div>
    <div><div class="lbl">800</div><div class="w" style="font-weight:800">Black</div></div>
  </div>
</div>

</div></body></html>
