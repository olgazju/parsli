<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>parsli — local parcel intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   SKIN: Parsli Retro Station
   ═══════════════════════════════════════════════════════════════ */
:root {
  --c-bg:           #e5dfd4;
  --c-surface:      #f5f0e8;
  --c-surface-hi:   #faf7f2;
  --c-text:         #3d4a3a;
  --c-text-muted:   #7a8a7e;
  --c-border:       #c8bfb2;
  --c-border-light: #ddd8cf;

  --c-sidebar-bg:       #3d4a3a;
  --c-sidebar-text:     #a8b8a6;
  --c-sidebar-hi:       #c8d8c6;
  --c-sidebar-active:   rgba(255,255,255,.08);
  --c-sidebar-active-border: #8aab8c;

  --c-green:  #6b8f6e;
  --c-sage:   #8aab8c;
  --c-blue:   #87ceeb;
  --c-tan:    #c4956a;
  --c-red:    #b54b3a;
  --c-yellow: #e8b44c;
  --c-pink:   #f2a7b3;
  --c-muted:  #d5cec2;
  --c-metal:  #7a8a7e;

  --badge-blue-bg:   #daeef7; --badge-blue-text:   #3a6a82;
  --badge-green-bg:  #dce8dc; --badge-green-text:  #3d5a3f;
  --badge-yellow-bg: #fdf3d7; --badge-yellow-text: #8a6a1e;
  --badge-red-bg:    #f5dcd7; --badge-red-text:    #7a2e22;
  --badge-gray-bg:   #e8e4dd; --badge-gray-text:   #5a6358;

  --r-card: 12px;
  --r-pill: 20px;
  --sidebar-w: 208px;
  --font: 'Nunito', system-ui, sans-serif;
  --mono: 'Courier New', Courier, monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  display: flex;
}

/* subtle dot-grid texture on the page background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(61,74,58,.12) 1px, transparent 0);
  background-size: 22px 22px;
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--c-sidebar-bg);
  display: flex;
  flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 10;
}

#content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  padding: 32px 36px 64px;
  max-width: 800px;
}

/* ── Sidebar ───────────────────────────────────────────────────── */
.logo-area {
  padding: 28px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,.07);
}

.logo {
  font-size: 26px;
  font-weight: 800;
  color: var(--c-surface);
  letter-spacing: 1.5px;
}

.logo em { font-style: normal; color: var(--c-sage); }

.tagline {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--c-sidebar-text);
  margin-top: 4px;
}

nav {
  flex: 1;
  padding: 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--c-sidebar-text);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: background .15s, color .15s;
  border-left: 3px solid transparent;
  text-decoration: none;
}

.nav-item:hover {
  background: var(--c-sidebar-active);
  color: var(--c-sidebar-hi);
}

.nav-item.active {
  background: var(--c-sidebar-active);
  color: var(--c-surface);
  border-left-color: var(--c-sidebar-active-border);
}

.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px 16px 20px;
  border-top: 1px solid rgba(255,255,255,.07);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.station-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--c-sidebar-text);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #5a6a58;
  flex-shrink: 0;
  transition: background .3s;
}

.status-dot.online { background: var(--c-sage); box-shadow: 0 0 6px var(--c-sage); }

.dev-toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--c-sidebar-text);
  cursor: pointer;
}

.toggle-switch {
  position: relative;
  width: 28px; height: 16px;
  flex-shrink: 0;
}

.toggle-switch input { display: none; }

.toggle-track {
  position: absolute; inset: 0;
  background: #2a3428;
  border-radius: 8px;
  transition: background .2s;
}

.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 12px; height: 12px;
  background: var(--c-sidebar-text);
  border-radius: 50%;
  transition: transform .2s, background .2s;
}

.toggle-switch input:checked + .toggle-track { background: var(--c-sage); }
.toggle-switch input:checked ~ .toggle-thumb { transform: translateX(12px); background: var(--c-sidebar-bg); }

/* ── Screen header ─────────────────────────────────────────────── */
.screen-header {
  margin-bottom: 24px;
}

.screen-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--c-text);
  letter-spacing: -.3px;
}

.screen-sub {
  font-size: 12.5px;
  color: var(--c-text-muted);
  margin-top: 3px;
  letter-spacing: .5px;
  text-transform: uppercase;
  font-weight: 600;
}

/* ── Stat cards ─────────────────────────────────────────────────── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--c-surface);
  border-radius: var(--r-card);
  padding: 14px 16px 12px;
  border-bottom: 3px solid var(--c-muted);
}

.stat-card.blue   { border-bottom-color: var(--c-blue); }
.stat-card.green  { border-bottom-color: var(--c-green); }
.stat-card.yellow { border-bottom-color: var(--c-yellow); }
.stat-card.red    { border-bottom-color: var(--c-red); }
.stat-card.gray   { border-bottom-color: var(--c-metal); }

.stat-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--c-text-muted);
  margin-bottom: 4px;
}

.stat-num {
  font-size: 26px;
  font-weight: 800;
  color: var(--c-text);
  line-height: 1;
}

/* ── Search & filter bar ──────────────────────────────────────── */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 180px;
}

.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--c-text-muted);
  pointer-events: none;
}

.search-input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  background: var(--c-surface);
  border: 1px solid var(--c-border-light);
  border-radius: 10px;
  font: 13.5px var(--font);
  color: var(--c-text);
  outline: none;
  transition: border-color .15s;
}

.search-input:focus { border-color: var(--c-sage); }
.search-input::placeholder { color: var(--c-text-muted); }

.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-pill {
  padding: 7px 14px;
  border-radius: var(--r-pill);
  font: 600 12px var(--font);
  border: 1.5px solid var(--c-border-light);
  background: var(--c-surface);
  color: var(--c-text-muted);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.filter-pill:hover { border-color: var(--c-sage); color: var(--c-text); }

.filter-pill.active {
  background: var(--c-text);
  border-color: var(--c-text);
  color: var(--c-surface);
}

/* ── Parcel cards ──────────────────────────────────────────────── */
.parcel-list { display: flex; flex-direction: column; gap: 8px; }

.parcel-card {
  background: var(--c-surface);
  border-radius: var(--r-card);
  border-left: 4px solid var(--c-muted);
  overflow: hidden;
  transition: box-shadow .15s;
}

.parcel-card:hover { box-shadow: 0 2px 12px rgba(61,74,58,.08); }

.card-main {
  padding: 14px 16px 12px;
  cursor: pointer;
}

.card-row1 {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 5px;
}

.card-title {
  font-size: 14.5px;
  font-weight: 700;
  color: var(--c-text);
  line-height: 1.3;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.expand-btn {
  background: none;
  border: none;
  color: var(--c-text-muted);
  font-size: 11px;
  cursor: pointer;
  padding: 2px 4px;
  transition: transform .25s;
  line-height: 1;
}

.parcel-card.expanded .expand-btn { transform: rotate(180deg); }

.card-row2 {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}

.card-meta {
  font-size: 11.5px;
  color: var(--c-text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}

.card-meta .mono { font-family: var(--mono); font-size: 11px; }

.card-age {
  font-size: 11px;
  color: var(--c-text-muted);
  flex-shrink: 0;
  white-space: nowrap;
}

.action-banner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--badge-red-bg);
  border-radius: 8px;
  padding: 7px 10px;
  margin-bottom: 8px;
}

.action-banner.payment { background: var(--badge-yellow-bg); }

.action-banner-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-red);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}

.action-banner.payment .action-banner-dot { background: var(--c-yellow); animation: none; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}

.action-banner-text {
  font-size: 11.5px;
  font-weight: 700;
  color: var(--badge-red-text);
}

.action-banner.payment .action-banner-text { color: var(--badge-yellow-text); }

/* ── Mini progress tracker ─────────────────────────────────────── */
.mini-tracker {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 4px;
}

.track-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  z-index: 1;
}

.track-dot.past    { background: var(--c-green); }
.track-dot.current { background: var(--c-blue); border: 2px solid var(--c-green); box-shadow: 0 0 0 3px rgba(135,206,235,.25); }
.track-dot.future  { background: var(--c-muted); }

.track-line {
  flex: 1;
  height: 3px;
  border-radius: 2px;
}

.track-line.past   { background: var(--c-green); }
.track-line.future { background: var(--c-muted); }

.track-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}

.track-labels span {
  font-size: 9.5px;
  color: var(--c-text-muted);
  font-weight: 600;
  letter-spacing: .3px;
  text-align: center;
  flex: 1;
}

.track-labels span:first-child { text-align: left; }
.track-labels span:last-child  { text-align: right; }

/* ── Card footer (always-visible subtle actions) ─────────────── */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 10px;
  gap: 8px;
}

.card-links { display: flex; gap: 4px; }

.link-btn {
  background: none;
  border: none;
  font: 600 11px var(--font);
  color: var(--c-text-muted);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background .12s, color .12s;
}

.link-btn:hover { background: var(--c-border-light); color: var(--c-text); }
.link-btn.received-active { color: var(--c-green); }
.link-btn.delete-btn:hover { background: var(--badge-red-bg); color: var(--badge-red-text); }

/* ── Timeline (expanded) ─────────────────────────────────────── */
.card-timeline {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s cubic-bezier(.4,0,.2,1);
}

.parcel-card.expanded .card-timeline { max-height: 3000px; }

.timeline-inner {
  padding: 0 16px 16px;
  border-top: 1px solid var(--c-border-light);
}

.tl-loading {
  padding: 20px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--c-text-muted);
  font-size: 12.5px;
}

.tl-event {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--c-border-light);
  position: relative;
}

.tl-event:last-child { border-bottom: none; }

.tl-spine {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
  width: 16px;
  padding-top: 2px;
}

.tl-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-bottom: 4px;
}

.tl-dot.past    { background: var(--c-green); }
.tl-dot.current {
  background: var(--c-blue);
  border: 2px solid var(--c-green);
  box-shadow: 0 0 0 3px rgba(135,206,235,.2);
  width: 14px; height: 14px;
  margin-left: -1px;
}

.tl-dot.side    { background: var(--c-red); }
.tl-dot.side.payment { background: var(--c-yellow); }

.tl-line {
  width: 2px;
  flex: 1;
  min-height: 12px;
  background: var(--c-muted);
  border-radius: 1px;
}

.tl-line.past { background: var(--c-green); }

.tl-body { flex: 1; min-width: 0; }

.tl-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 3px;
}

.tl-status {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--c-text);
}

.tl-event.current .tl-status { color: var(--c-blue); }

.tl-date {
  font-size: 11px;
  color: var(--c-text-muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.tl-evidence {
  font-size: 11.5px;
  color: var(--c-text-muted);
  line-height: 1.5;
  margin-bottom: 3px;
}

.tl-ids {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--c-text-muted);
}

.tl-obs {
  display: flex;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.obs-chip {
  font-size: 9.5px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--c-border-light);
  color: var(--c-metal);
  font-weight: 600;
  font-family: var(--mono);
}

/* ── Badges ──────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 10.5px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  white-space: nowrap;
  letter-spacing: .3px;
}

.badge-blue   { background: var(--badge-blue-bg);   color: var(--badge-blue-text); }
.badge-green  { background: var(--badge-green-bg);  color: var(--badge-green-text); }
.badge-yellow { background: var(--badge-yellow-bg); color: var(--badge-yellow-text); }
.badge-red    { background: var(--badge-red-bg);    color: var(--badge-red-text); }
.badge-gray   { background: var(--badge-gray-bg);   color: var(--badge-gray-text); }

.review-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--c-yellow);
  margin-right: 5px;
}

/* ── Empty state ──────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 72px 24px;
  background: var(--c-surface);
  border-radius: var(--r-card);
}

.empty-glyph {
  font-size: 52px;
  line-height: 1;
  margin-bottom: 20px;
}

.empty-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--c-text);
  margin-bottom: 8px;
}

.empty-sub {
  font-size: 13px;
  color: var(--c-text-muted);
  max-width: 340px;
  margin: 0 auto 24px;
  line-height: 1.7;
}

/* ── Buttons ──────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 10px;
  font: 600 13.5px var(--font);
  border: none;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  text-decoration: none;
}

.btn:active { transform: scale(.97); }

.btn-primary {
  background: var(--c-text);
  color: var(--c-surface);
}

.btn-primary:hover { opacity: .88; }

.btn-secondary {
  background: var(--c-surface);
  color: var(--c-text);
  border: 1.5px solid var(--c-border);
}

.btn-secondary:hover { background: var(--c-bg); }

.btn-danger {
  background: var(--badge-red-bg);
  color: var(--badge-red-text);
  border: 1.5px solid rgba(181,75,58,.2);
}

.btn-danger:hover { background: #eeddd9; }

.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.btn-sm { padding: 7px 13px; font-size: 12.5px; border-radius: 8px; }

/* ── Accounts screen ──────────────────────────────────────────── */
.section-box {
  background: var(--c-surface);
  border-radius: var(--r-card);
  overflow: hidden;
  margin-bottom: 18px;
}

.section-box-header {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--c-border-light);
}

.section-box-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--c-text-muted);
}

.account-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--c-border-light);
}

.account-row:last-child { border-bottom: none; }

.account-avatar {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--c-border-light);
  color: var(--c-text-muted);
  font-size: 16px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  text-transform: uppercase;
}

.account-info { flex: 1; min-width: 0; }

.account-email {
  font-size: 13.5px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.account-meta {
  font-size: 11px;
  color: var(--c-text-muted);
  margin-top: 2px;
}

.sync-indicator {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10.5px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
}

.sync-indicator.complete  { background: var(--badge-green-bg);  color: var(--badge-green-text); }
.sync-indicator.pending   { background: var(--badge-gray-bg);   color: var(--badge-gray-text); }
.sync-indicator.syncing   { background: var(--badge-blue-bg);   color: var(--badge-blue-text); }

.account-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

/* ── Sensor panel ─────────────────────────────────────────────── */
.sensors-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 14px 18px;
}

.sensor-card {
  background: var(--c-bg);
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
  border: 1.5px solid var(--c-border-light);
  opacity: .5;
}

.sensor-card.active {
  opacity: 1;
  border-color: var(--c-sage);
  background: var(--c-surface-hi);
}

.sensor-icon { font-size: 22px; margin-bottom: 6px; }

.sensor-name {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--c-text-muted);
  margin-bottom: 2px;
}

.sensor-label {
  font-size: 10px;
  color: var(--c-text);
  font-weight: 600;
}

.sensor-status {
  font-size: 9.5px;
  margin-top: 6px;
  font-weight: 700;
  letter-spacing: .5px;
}

.sensor-status.on   { color: var(--c-green); }
.sensor-status.off  { color: var(--c-metal); }

/* ── Privacy banner ───────────────────────────────────────────── */
.privacy-banner {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  background: var(--badge-green-bg);
  border-radius: var(--r-card);
  margin-bottom: 18px;
}

.privacy-icon { font-size: 20px; flex-shrink: 0; }

.privacy-text { font-size: 12.5px; color: var(--badge-green-text); line-height: 1.5; }
.privacy-text strong { font-weight: 800; }

/* ── Preferences screen ───────────────────────────────────────── */
.pref-section {
  background: var(--c-surface);
  border-radius: var(--r-card);
  overflow: hidden;
  margin-bottom: 16px;
}

.pref-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--c-border-light);
}

.pref-row:last-child { border-bottom: none; }

.pref-label {
  font-size: 13px;
  font-weight: 600;
  flex: 1;
}

.pref-meta {
  font-size: 11px;
  color: var(--c-text-muted);
  margin-top: 1px;
}

.domain-add-row {
  display: flex;
  gap: 8px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--c-border-light);
}

.domain-input {
  flex: 1;
  padding: 8px 12px;
  background: var(--c-bg);
  border: 1px solid var(--c-border-light);
  border-radius: 8px;
  font: 13px var(--font);
  color: var(--c-text);
  outline: none;
  transition: border-color .15s;
}

.domain-input:focus { border-color: var(--c-sage); }

.domain-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px 18px;
}

.domain-tag {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--c-bg);
  border: 1px solid var(--c-border);
  border-radius: 6px;
  padding: 4px 8px 4px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--c-text);
}

.tag-remove {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--c-text-muted);
  font-size: 14px;
  line-height: 1;
  padding: 0;
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px;
  transition: background .12s, color .12s;
}

.tag-remove:hover { background: var(--badge-red-bg); color: var(--badge-red-text); }

.skin-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--c-border-light);
  cursor: pointer;
}

.skin-option:last-child { border-bottom: none; }

.skin-radio {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid var(--c-border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .15s;
}

.skin-radio.active { border-color: var(--c-green); }
.skin-radio.active::after {
  content: '';
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--c-green);
}

.skin-name {
  font-size: 13px;
  font-weight: 700;
}

.skin-desc {
  font-size: 11px;
  color: var(--c-text-muted);
  margin-top: 1px;
}

.skin-tag {
  margin-left: auto;
  font-size: 10px;
  color: var(--c-metal);
  background: var(--c-bg);
  border: 1px solid var(--c-border-light);
  border-radius: 4px;
  padding: 2px 7px;
  font-weight: 700;
}

/* ── Diagnostics screen ───────────────────────────────────────── */
.diag-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.diag-card {
  background: var(--c-sidebar-bg);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--c-sidebar-text);
}

.diag-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.diag-num {
  font-size: 22px;
  font-weight: 800;
  color: var(--c-sidebar-hi);
  font-family: var(--mono);
}

.diag-table-wrap {
  background: var(--c-surface);
  border-radius: var(--r-card);
  overflow: hidden;
  margin-bottom: 16px;
}

.diag-table-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--c-border-light);
}

.diag-table-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--c-text-muted);
}

table.diag {
  width: 100%;
  border-collapse: collapse;
  font-size: 11.5px;
}

table.diag th {
  text-align: left;
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--c-text-muted);
  background: var(--c-bg);
  border-bottom: 1px solid var(--c-border-light);
}

table.diag td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--c-border-light);
  color: var(--c-text);
  vertical-align: top;
}

table.diag tr:last-child td { border-bottom: none; }

table.diag .mono { font-family: var(--mono); font-size: 10.5px; color: var(--c-metal); }
table.diag .relevant { color: var(--badge-green-text); font-weight: 700; }
table.diag .ignored  { color: var(--c-text-muted); }
table.diag .needs-review { color: var(--badge-red-text); font-weight: 700; }

.query-batch {
  padding: 12px 14px;
  border-bottom: 1px solid var(--c-border-light);
}

.query-batch:last-child { border-bottom: none; }

.batch-id {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--c-text-muted);
  margin-bottom: 6px;
}

.query-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11.5px;
  padding: 3px 0;
}

.query-name { font-weight: 700; color: var(--c-text); }
.query-count { font-family: var(--mono); color: var(--c-metal); font-size: 11px; }
.query-ms { color: var(--c-sage); font-size: 10.5px; }

/* ── Loading / spinner ────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }

.spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--c-border-light);
  border-top-color: var(--c-sage);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

.spinner.lg { width: 24px; height: 24px; border-width: 3px; }

.full-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  gap: 12px;
  color: var(--c-text-muted);
  font-size: 13px;
}

/* ── Toast ────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(90px);
  background: var(--c-text);
  color: var(--c-surface);
  padding: 10px 20px;
  border-radius: 10px;
  font: 600 13px var(--font);
  box-shadow: 0 4px 20px rgba(0,0,0,.18);
  transition: transform .28s cubic-bezier(.2,.8,.4,1);
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}

.toast.show   { transform: translateX(-50%) translateY(0); }
.toast.error  { background: var(--c-red); }
.toast.success{ background: var(--c-green); }

/* ── Connecting / pending banner ──────────────────────────────── */
.pending-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--badge-blue-bg);
  border-radius: 8px;
  font-size: 12.5px;
  color: var(--badge-blue-text);
  font-weight: 600;
  margin-bottom: 12px;
}

/* ── Onboarding state (no accounts) ──────────────────────────── */
.onboarding {
  max-width: 460px;
  margin: 40px auto 0;
  text-align: center;
}

.onboarding-logo { font-size: 44px; margin-bottom: 20px; }

.onboarding h2 {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 10px;
}

.onboarding p {
  font-size: 14px;
  color: var(--c-text-muted);
  line-height: 1.7;
  margin-bottom: 28px;
}

.onboarding-privacy {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--badge-green-bg);
  border-radius: 10px;
  padding: 12px 16px;
  margin-top: 20px;
  text-align: left;
}

.onboarding-privacy span {
  font-size: 12px;
  color: var(--badge-green-text);
  line-height: 1.5;
}

/* ── Misc ─────────────────────────────────────────────────────── */
.received-overlay {
  position: absolute; inset: 0;
  background: rgba(245,240,232,.8);
  border-radius: var(--r-card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--c-green);
  gap: 8px;
  pointer-events: none;
}

.parcel-card { position: relative; }
.parcel-card.received-card { opacity: .7; }

.separator {
  height: 1px;
  background: var(--c-border-light);
  margin: 16px 0;
}

.info-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--c-text-muted);
  padding: 4px 0;
}

.no-results {
  text-align: center;
  padding: 40px 20px;
  color: var(--c-text-muted);
  font-size: 13px;
}

.dev-only { display: none; }
</style>
</head>
<body>

<aside id="sidebar">
  <div class="logo-area">
    <div class="logo">pars<em>li</em></div>
    <div class="tagline">Local Parcel Intelligence</div>
  </div>

  <nav id="nav">
    <button class="nav-item active" data-screen="parcels">
      <span class="nav-icon">📦</span>
      <span class="nav-label">Parcels</span>
    </button>
    <button class="nav-item" data-screen="accounts">
      <span class="nav-icon">📡</span>
      <span class="nav-label">Comms Array</span>
    </button>
    <button class="nav-item" data-screen="preferences">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Preferences</span>
    </button>
    <button class="nav-item dev-only" data-screen="diagnostics" id="nav-diagnostics">
      <span class="nav-icon">🔬</span>
      <span class="nav-label">Diagnostics</span>
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="station-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connecting…</span>
    </div>
    <label class="dev-toggle-row" title="Enable developer diagnostics screen">
      <div class="toggle-switch">
        <input type="checkbox" id="dev-toggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </div>
      <span>Dev mode</span>
    </label>
  </div>
</aside>

<main id="content">
  <div class="full-loading">
    <div class="spinner lg"></div>
    <span>Scanning cargo manifest…</span>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const state = {
  screen: 'parcels',
  dashboard: null,
  detailCache: {},
  fetchingDetail: new Set(),
  expandedIds: new Set(),
  receivedIds: new Set(JSON.parse(localStorage.getItem('parsli_received') || '[]')),
  accounts: [],
  domainPrefs: null,
  appStatus: null,
  devMode: localStorage.getItem('parsli_devmode') === 'true',
  observability: null,
  syncingIds: new Set(),
  connectPending: false,
  searchQuery: '',
  filterStatus: 'all',
};

/* ═══════════════════════════════════════════════════════════════
   THEME / STATUS HELPERS
   ═══════════════════════════════════════════════════════════════ */
const STATUS_BORDER = {
  delivered:                        'var(--c-green)',
  shipped:                          'var(--c-blue)',
  received_by_carrier:              'var(--c-blue)',
  in_transit:                       'var(--c-blue)',
  arrived_in_destination_country:   'var(--c-blue)',
  customs_pending:                  'var(--c-yellow)',
  customs_released:                 'var(--c-yellow)',
  handed_to_local_carrier:          'var(--c-blue)',
  out_for_delivery:                 'var(--c-yellow)',
  ready_for_pickup:                 'var(--c-yellow)',
  action_required:                  'var(--c-red)',
  payment_required:                 'var(--c-red)',
  delayed_or_problem:               'var(--c-red)',
  order_confirmed:                  'var(--c-muted)',
  unknown:                          'var(--c-muted)',
};

const STATUS_BADGE = {
  delivered:                        'green',
  shipped:                          'blue',
  received_by_carrier:              'blue',
  in_transit:                       'blue',
  arrived_in_destination_country:   'blue',
  customs_pending:                  'yellow',
  customs_released:                 'yellow',
  handed_to_local_carrier:          'blue',
  out_for_delivery:                 'yellow',
  ready_for_pickup:                 'yellow',
  action_required:                  'red',
  payment_required:                 'red',
  delayed_or_problem:               'red',
  order_confirmed:                  'gray',
  unknown:                          'gray',
};

// Milestone index: 0=Ordered, 1=Shipped, 2=Arriving, 3=Delivered
const MILESTONE = {
  order_confirmed: 0,
  shipped: 1, received_by_carrier: 1, in_transit: 1,
  arrived_in_destination_country: 1, customs_pending: 1,
  customs_released: 1, handed_to_local_carrier: 1,
  out_for_delivery: 2, ready_for_pickup: 2,
  delivered: 3,
};

const MILESTONE_LABELS = ['Ordered', 'Shipped', 'Arriving', 'Delivered'];

function badgeClass(status) { return STATUS_BADGE[status] || 'gray'; }
function borderColor(status) { return STATUS_BORDER[status] || 'var(--c-muted)'; }
function milestoneOf(status) { return MILESTONE[status] ?? -1; }

/* ═══════════════════════════════════════════════════════════════
   API
   ═══════════════════════════════════════════════════════════════ */
async function apiFetch(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) {
    const body = await r.json().catch(() => ({ detail: r.statusText }));
    const msg = typeof body.detail === 'string' ? body.detail
      : body.detail?.error || r.statusText;
    throw new Error(msg);
  }
  return r.json();
}

const api = {
  dashboard:      () => apiFetch('/api/dashboard/projection'),
  detail:         id => apiFetch(`/api/shipments/${encodeURIComponent(id)}/detail`),
  deleteShipment: id => apiFetch(`/api/shipments/${encodeURIComponent(id)}`, { method: 'DELETE' }),
  accounts:       () => apiFetch('/api/accounts'),
  connect:        () => apiFetch('/api/accounts/connect', { method: 'POST' }),
  removeAccount:  id => apiFetch(`/api/accounts/${encodeURIComponent(id)}`, { method: 'DELETE' }),
  syncInitial:    id => apiFetch(`/api/sync/initial/${encodeURIComponent(id)}`, { method: 'POST' }),
  syncIncremental:id => apiFetch(`/api/sync/incremental/${encodeURIComponent(id)}`, { method: 'POST' }),
  status:         () => apiFetch('/api/status'),
  domains:        () => apiFetch('/api/settings/domains'),
  addAllowlist:   d  => apiFetch('/api/settings/domains/allowlist', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({domain:d}) }),
  delAllowlist:   d  => apiFetch(`/api/settings/domains/allowlist/${encodeURIComponent(d)}`, { method: 'DELETE' }),
  addBlocklist:   d  => apiFetch('/api/settings/domains/blocklist', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({domain:d}) }),
  delBlocklist:   d  => apiFetch(`/api/settings/domains/blocklist/${encodeURIComponent(d)}`, { method: 'DELETE' }),
  observability:  () => apiFetch('/api/dev/observability'),
};

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
function navigate(screen) {
  state.screen = screen;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.screen === screen);
  });
  renderContent();
  if (screen === 'parcels')     loadDashboard();
  if (screen === 'accounts')    loadAccounts();
  if (screen === 'preferences') loadPrefs();
  if (screen === 'diagnostics') loadObservability();
}

/* ═══════════════════════════════════════════════════════════════
   DATA LOADING
   ═══════════════════════════════════════════════════════════════ */
async function loadInitial() {
  try {
    const [status, accounts] = await Promise.all([api.status(), api.accounts()]);
    state.appStatus = status;
    state.accounts = accounts;
    updateStatusDot(status.credentials_configured && accounts.length > 0);
  } catch (e) {
    updateStatusDot(false);
    renderContent('error');
    return;
  }

  if (state.accounts.length === 0) {
    renderContent(); // show onboarding
  } else {
    await loadDashboard();
  }
}

async function loadDashboard() {
  if (state.screen !== 'parcels') return;
  renderContent('loading');
  try {
    state.dashboard = await api.dashboard();
    renderContent();
  } catch (e) {
    renderContent('error');
  }
}

async function loadAccounts() {
  try {
    state.accounts = await api.accounts();
    if (state.screen === 'accounts') renderContent();
  } catch (e) {
    toast('Could not load accounts: ' + e.message, 'error');
  }
}

async function loadPrefs() {
  try {
    state.domainPrefs = await api.domains();
    if (state.screen === 'preferences') renderContent();
  } catch (e) {
    toast('Could not load preferences: ' + e.message, 'error');
  }
}

async function loadObservability() {
  if (state.screen !== 'diagnostics') return;
  try {
    state.observability = await api.observability();
    renderContent();
  } catch (e) {
    toast('Could not load diagnostics: ' + e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════════════
   CONTENT RENDERING
   ═══════════════════════════════════════════════════════════════ */
function renderContent(hint) {
  const el = document.getElementById('content');

  if (hint === 'loading') {
    el.innerHTML = loadingHTML('Scanning cargo manifest…');
    return;
  }

  if (hint === 'error') {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-glyph">📡</div>
      <div class="empty-title">Station unresponsive</div>
      <div class="empty-sub">Could not reach the local backend. Make sure <code>parsli serve</code> is running.</div>
    </div>`;
    return;
  }

  switch (state.screen) {
    case 'parcels':     el.innerHTML = renderParcels();     break;
    case 'accounts':    el.innerHTML = renderAccounts();    break;
    case 'preferences': el.innerHTML = renderPreferences(); break;
    case 'diagnostics': el.innerHTML = renderDiagnostics(); break;
  }
}

function loadingHTML(msg = 'Loading…') {
  return `<div class="full-loading"><div class="spinner lg"></div><span>${esc(msg)}</span></div>`;
}

/* ═══════════════════════════════════════════════════════════════
   PARCELS SCREEN
   ═══════════════════════════════════════════════════════════════ */
function renderParcels() {
  // No accounts → onboarding
  if (!state.accounts.length) return renderOnboarding();
  // Loading
  if (!state.dashboard) return loadingHTML('Scanning cargo manifest…');

  const { shipments, active_count, delivered_count, order_only_count, needs_review_count } = state.dashboard;
  const filtered = filterShipments(shipments);

  return `
    <div class="screen-header">
      <div class="screen-title">Parcels</div>
      <div class="screen-sub">All tracked shipments · ${shipments.length} total</div>
    </div>

    <div class="stat-grid">
      <div class="stat-card blue">
        <div class="stat-label">Active</div>
        <div class="stat-num">${active_count}</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Delivered</div>
        <div class="stat-num">${delivered_count}</div>
      </div>
      <div class="stat-card gray">
        <div class="stat-label">Order Only</div>
        <div class="stat-num">${order_only_count}</div>
      </div>
      <div class="stat-card ${needs_review_count > 0 ? 'red' : 'gray'}">
        <div class="stat-label">Needs Review</div>
        <div class="stat-num">${needs_review_count}</div>
      </div>
    </div>

    <div class="controls-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" type="text" placeholder="Search merchant, carrier, tracking…"
          value="${esc(state.searchQuery)}" oninput="onSearch(this.value)">
      </div>
      <div class="filter-pills">
        ${['all','active','action','delivered'].map(f => `
          <button class="filter-pill${state.filterStatus===f?' active':''}" onclick="setFilter('${f}')">
            ${filterLabel(f)}
          </button>`).join('')}
      </div>
    </div>

    <div class="parcel-list" id="parcel-list">
      ${filtered.length === 0
        ? (state.searchQuery || state.filterStatus !== 'all'
            ? `<div class="no-results">No parcels match your search. Try broadening the filter.</div>`
            : emptyParcelsHTML())
        : filtered.map(s => renderParcelCard(s)).join('')}
    </div>`;
}

function filterLabel(f) {
  return { all: 'All', active: 'Active', action: 'Needs Action', delivered: 'Delivered' }[f] || f;
}

function filterShipments(shipments) {
  let list = shipments;

  if (state.searchQuery) {
    const q = state.searchQuery.toLowerCase();
    list = list.filter(s =>
      (s.display_title || '').toLowerCase().includes(q) ||
      (s.display_merchant || '').toLowerCase().includes(q) ||
      (s.merchant || '').toLowerCase().includes(q) ||
      (s.tracking_number || '').toLowerCase().includes(q) ||
      (s.order_number || '').toLowerCase().includes(q)
    );
  }

  if (state.filterStatus === 'active') {
    list = list.filter(s => s.current_status !== 'delivered');
  } else if (state.filterStatus === 'action') {
    list = list.filter(s =>
      s.current_status === 'action_required' ||
      s.current_status === 'payment_required' ||
      s.needs_review
    );
  } else if (state.filterStatus === 'delivered') {
    list = list.filter(s =>
      s.current_status === 'delivered' ||
      state.receivedIds.has(s.shipment_id)
    );
  }

  return list;
}

function renderParcelCard(s) {

        <span class="card-age">${relTime(s.last_status_date)}</span>

  </div>`;
}

function renderMiniTracker(currentMil) {
  const html = MILESTONE_LABELS.map((label, i) => {
    let dotClass = i < currentMil ? 'past' : i === currentMil ? 'current' : 'future';
    const lineClass = i < currentMil ? 'past' : 'future';
    const lineEl = i < MILESTONE_LABELS.length - 1
      ? `<div class="track-line ${lineClass}"></div>` : '';
    return `<div class="track-dot ${dotClass}"></div>${lineEl}`;
  }).join('');

  const labels = MILESTONE_LABELS.map(l => `<span>${l}</span>`).join('');

  if (currentMil < 0) return '';

  return `<div class="mini-tracker">${html}</div>
          <div class="track-labels">${labels}</div>`;
}

function renderTimeline(events, detail) {
  if (!events || events.length === 0) {
    return `<div class="tl-loading"><span>No events recorded.</span></div>`;
  }

  const lastIdx = events.length - 1;

  return events.map((ev, i) => {
    const isLast = i === lastIdx;
    const isCurrent = isLast;
    const isSide = ['action_required', 'payment_required', 'delayed_or_problem'].includes(ev.status);

    let dotClass = 'past';
    if (isCurrent) dotClass = 'current';
    if (isSide) dotClass = `side${ev.status === 'payment_required' ? ' payment' : ''}`;

    const lineClass = isCurrent ? '' : 'past';
    const lineEl = isLast ? '' : `<div class="tl-line ${lineClass}"></div>`;

    const ids = [];
    if (ev.tracking_number) ids.push(`Tracking: <span class="mono">${esc(ev.tracking_number)}</span>`);
    if (ev.order_number) ids.push(`Order: <span class="mono">#${esc(ev.order_number)}</span>`);

    const obs = [];
    if (ev.decision_source) obs.push(`src:${ev.decision_source}`);
    if (ev.model_mode && ev.model_mode !== 'skip_model') obs.push(`model:${ev.model_mode}`);
    if (ev.model_latency_ms) obs.push(`${Math.round(ev.model_latency_ms)}ms`);
    if (ev.needs_review) obs.push('⚠ review');

    const obsHTML = state.devMode && obs.length
      ? `<div class="tl-obs">${obs.map(o => `<span class="obs-chip">${esc(o)}</span>`).join('')}</div>`
      : '';

    return `<div class="tl-event${isCurrent ? ' current' : ''}">
      <div class="tl-spine">
        <div class="tl-dot ${dotClass}"></div>
        ${lineEl}
      </div>
      <div class="tl-body">
        <div class="tl-header">
          <span class="tl-status">${esc(ev.status_label)}</span>
          <span class="tl-date">${fmtDate(ev.event_date)}</span>
        </div>
        ${ev.status_evidence ? `<div class="tl-evidence">${esc(ev.status_evidence)}</div>` : ''}
        ${ids.length ? `<div class="tl-ids">${ids.join(' · ')}</div>` : ''}
        ${obsHTML}
      </div>
    </div>`;
  }).join('');
}

function groupQueryBatches(runs) {
  const batches = {};
  for (const r of runs) {
    if (!batches[r.fetch_batch_id]) {
      batches[r.fetch_batch_id] = { id: r.fetch_batch_id, started_at: r.started_at, runs: [] };
    }
    batches[r.fetch_batch_id].runs.push(r);
  }
  return Object.values(batches).sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
}

/* ── Card expand ─────────────────────────────────────────────── */
async function toggleExpand(id) {
  const card = document.querySelector(`.parcel-card[data-id="${id}"]`);
  if (!card) return;

  if (state.expandedIds.has(id)) {
    state.expandedIds.delete(id);
    card.classList.remove('expanded');
    return;
  }

  state.expandedIds.add(id);
  card.classList.add('expanded');

  if (!state.detailCache[id] && !state.fetchingDetail.has(id)) {
    state.fetchingDetail.add(id);
    const tlEl = card.querySelector('.card-timeline');
    tlEl.innerHTML = `<div class="timeline-inner"><div class="tl-loading"><div class="spinner"></div><span>Fetching event log…</span></div></div>`;

    try {
      const detail = await api.detail(id);
      state.detailCache[id] = detail;
      tlEl.innerHTML = `<div class="timeline-inner">${renderTimeline(detail.events, detail)}</div>`;
    } catch (e) {
      tlEl.innerHTML = `<div class="timeline-inner" style="color:var(--c-red);padding:16px 0;font-size:12.5px;">Could not load events: ${esc(e.message)}</div>`;
    } finally {
      state.fetchingDetail.delete(id);
    }
  }
}

/* ── Mark received ────────────────────────────────────────────── */
function markReceived(id, received) {
  if (received) {
    state.receivedIds.add(id);
  } else {
    state.receivedIds.delete(id);
  }
  localStorage.setItem('parsli_received', JSON.stringify([...state.receivedIds]));

  const card = document.querySelector(`.parcel-card[data-id="${id}"]`);
  if (!card) return;

  card.classList.toggle('received-card', received);
  const btn = card.querySelector(`[data-action="${received ? 'receive' : 'unreceive'}"]`);
  if (btn) {
    btn.dataset.action = received ? 'unreceive' : 'receive';
    btn.className = received ? 'link-btn received-active' : 'link-btn';
    btn.textContent = received ? '✓ Received' : 'Mark received';
  }

  toast(received ? 'Marked as received.' : 'Undo — removed from received.', 'success');
}

/* ── Delete shipment ──────────────────────────────────────────── */
async function confirmDelete(id) {
  const shipment = state.dashboard?.shipments?.find(s => s.shipment_id === id);
  const title = shipment?.display_title || id;
  if (!confirm(`Delete "${title}"?\n\nThis removes the shipment and all its events permanently. Use this for false positives or duplicate entries.`)) return;

  try {
    await api.deleteShipment(id);
    state.receivedIds.delete(id);
    state.expandedIds.delete(id);
    delete state.detailCache[id];
    if (state.dashboard) {
      state.dashboard.shipments = state.dashboard.shipments.filter(s => s.shipment_id !== id);
      state.dashboard.total_count = Math.max(0, state.dashboard.total_count - 1);
    }
    const card = document.querySelector(`.parcel-card[data-id="${id}"]`);
    if (card) card.remove();
    toast('Shipment deleted.', 'success');
  } catch (e) {
    toast('Delete failed: ' + e.message, 'error');
  }
}

/* ── OAuth connect ────────────────────────────────────────────── */
async function connectAccount() {
  state.connectPending = true;
  renderContent();

  let data;
  try {
    data = await api.connect();
  } catch (e) {
    state.connectPending = false;
    toast(e.message || 'Could not start sign-in', 'error');
    renderContent();
    return;
  }

  const popup = window.open(data.auth_url, 'parsli_oauth', 'width=520,height=660,left=200,top=80');

  const handler = async (e) => {
    if (e.data?.type === 'parsli_auth_success') {
      cleanup();
      state.connectPending = false;
      state.accounts = await api.accounts();
      updateStatusDot(state.accounts.length > 0);
      renderContent();
      toast('Account connected. Starting initial sync…', 'success');
      const newAccount = state.accounts[state.accounts.length - 1];
      if (newAccount) syncAccount(newAccount.account_id, 'initial');
    } else if (e.data?.type === 'parsli_auth_error') {
      cleanup();
      state.connectPending = false;
      toast(e.data.message || 'Sign-in failed', 'error');
      renderContent();
    }
  };

  window.addEventListener('message', handler);
  const poll = setInterval(() => {
    if (popup?.closed) { clearInterval(poll); if (state.connectPending) { state.connectPending = false; renderContent(); } }
  }, 800);
  function cleanup() { window.removeEventListener('message', handler); clearInterval(poll); }
}

/* ── Remove account ───────────────────────────────────────────── */
async function removeAccount(id) {
  if (!confirm(`Remove ${id}?\n\nThis disconnects the account and deletes the stored token. Existing parsed parcels are not affected.`)) return;
  try {
    await api.removeAccount(id);
    state.accounts = state.accounts.filter(a => a.account_id !== id);
    updateStatusDot(state.accounts.length > 0);
    renderContent();
    toast('Account removed.', 'success');
  } catch (e) {
    toast('Could not remove account: ' + e.message, 'error');
  }
}

/* ── Sync ─────────────────────────────────────────────────────── */
async function syncAccount(id, mode = 'incremental') {
  if (state.syncingIds.has(id)) return;
  state.syncingIds.add(id);
  if (state.screen === 'accounts') renderContent();

  try {
    const fn = mode === 'initial' ? api.syncInitial : api.syncIncremental;
    const result = await fn(id);
    toast(`Sync complete — ${result.new_ingested} new, ${result.processed} processed.`, 'success');
    state.accounts = await api.accounts();
    if (state.screen === 'parcels' || state.screen === 'accounts') {
      state.dashboard = await api.dashboard();
    }
  } catch (e) {
    if (e.message?.includes('token_missing') || e.message?.includes('auth_url')) {
      toast('Session expired — please reconnect the account.', 'error');
    } else {
      toast('Sync failed: ' + e.message, 'error');
    }
  } finally {
    state.syncingIds.delete(id);
    if (state.screen === 'accounts') renderContent();
    if (state.screen === 'parcels')  renderContent();
  }
}

async function syncAllAccounts() {
  const accounts = [...state.accounts];
  if (accounts.length === 0) return;
  for (const acct of accounts) {
    await syncAccount(acct.account_id);
  }
}

/* ── Domain preferences ───────────────────────────────────────── */
async function addDomain(type) {
  const input = document.getElementById(`${type}-input`);
  const domain = input?.value?.trim();
  if (!domain) return;

  try {
    const fn = type === 'allowlist' ? api.addAllowlist : api.addBlocklist;
    state.domainPrefs = await fn(domain);
    input.value = '';
    // Update just the tag container without full re-render
    const container = document.getElementById(`${type}-tags`);
    if (container) {
      const tags = state.domainPrefs[type].map(d => domainTag(d, type)).join('');
      container.innerHTML = tags || `<span style="font-size:12px;color:var(--c-text-muted);">None.</span>`;
    }
    toast(`${domain} added.`);
  } catch (e) {
    toast(e.message || 'Invalid domain', 'error');
  }
}

async function removeDomain(type, domain) {
  try {
    const fn = type === 'allowlist' ? api.delAllowlist : api.delBlocklist;
    state.domainPrefs = await fn(domain);
    const container = document.getElementById(`${type}-tags`);
    if (container) {
      const tags = state.domainPrefs[type].map(d => domainTag(d, type)).join('');
      container.innerHTML = tags || `<span style="font-size:12px;color:var(--c-text-muted);">None.</span>`;
    }
    toast(`${domain} removed.`);
  } catch (e) {
    toast(e.message || 'Could not remove', 'error');
  }
}

/* ── Search & filter ──────────────────────────────────────────── */
function onSearch(val) {
  state.searchQuery = val;
  debounceRender();
}

function setFilter(f) {
  state.filterStatus = f;
  renderContent();
}

let _renderTimer;
function debounceRender() {
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(renderContent, 200);
}

/* ── Dev mode ─────────────────────────────────────────────────── */
function toggleDevMode(on) {
  state.devMode = on;
  localStorage.setItem('parsli_devmode', on ? 'true' : 'false');

  document.querySelectorAll('.dev-only').forEach(el => {
    el.style.display = on ? 'block' : 'none';
  });

  // Sync both toggles
  const t1 = document.getElementById('dev-toggle');
  const t2 = document.getElementById('dev-toggle-pref');
  if (t1) t1.checked = on;
  if (t2) t2.checked = on;

  toast(on ? 'Diagnostics screen enabled.' : 'Diagnostics screen hidden.');
  if (on) navigate('diagnostics');
}

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function relTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diff = Date.now() - d;
  const mins = Math.floor(diff / 60_000);
  if (mins < 1)  return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24)  return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7)  return `${days}d ago`;
  return fmtDate(iso);
}

function updateStatusDot(online) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (!dot || !txt) return;
  dot.classList.toggle('online', online);
  txt.textContent = online ? 'Station online' : 'Not connected';
}

let _toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast${type ? ' ' + type : ''} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */

// Wire up dev toggle in sidebar
document.getElementById('dev-toggle').addEventListener('change', e => {
  toggleDevMode(e.target.checked);
});

// Apply initial dev mode state
if (state.devMode) {
  document.querySelectorAll('.dev-only').forEach(el => el.style.display = 'block');
  document.getElementById('dev-toggle').checked = true;
}

loadInitial();
</script>
